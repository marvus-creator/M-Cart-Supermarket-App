<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Cart Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC; /* Softer, premium gray background */
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <nav class="bg-gradient-to-r from-emerald-600 to-teal-500 shadow-lg mb-8">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center max-w-7xl">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🛒</span>
                <h1 class="text-2xl font-bold text-white tracking-tight">M-Cart</h1>
            </div>
            <span class="bg-white/20 text-white text-xs font-medium px-3 py-1 rounded-full backdrop-blur-sm">Admin Dashboard</span>
        </div>
    </nav>

    <div class="container mx-auto px-6 max-w-7xl">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 mb-10">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-slate-800">Add New Product</h2>
                <p class="text-sm text-slate-500 mt-1">Fill out the details below to add items to your inventory.</p>
            </div>
            
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 items-end">
                
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-700 mb-2">Product Name</label>
                    <input type="text" id="name" required placeholder="e.g. Fanta Orange" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5 transition-colors">
                </div>
                
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-700 mb-2">Price (RWF)</label>
                    <input type="number" id="price" required placeholder="0" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5 transition-colors">
                </div>
                
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-700 mb-2">Category</label>
                    <select id="category" required class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5 transition-colors">
                        <option value="Dairy">Dairy</option>
                        <option value="Bakery">Bakery</option>
                        <option value="Produce">Produce</option>
                        <option value="Stationery">Stationery</option>
                        <option value="Beverages">Beverages</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-700 mb-2">Stock Level</label>
                    <input type="number" id="stock" required placeholder="Quantity" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5 transition-colors">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-700 mb-2">Product Image</label>
                    <input type="file" id="image" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 transition-colors cursor-pointer">
                </div>

                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg text-sm px-5 py-3 text-center shadow-md hover:shadow-lg transition-all lg:col-span-5 mt-2">
                    + Save Product to Inventory
                </button>
            </form>
        </div>

        <div class="mb-20">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Current Inventory</h2>
                    <p class="text-sm text-slate-500 mt-1">Manage your store's products</p>
                </div>
            </div>
            
            <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                </div>
        </div>

    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/products';
        const productForm = document.getElementById('productForm');
        const productsGrid = document.getElementById('productsGrid');

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                
                productsGrid.innerHTML = ''; 
                
                if (products.length === 0) {
                    productsGrid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 bg-white rounded-2xl border border-dashed border-slate-300">No products found. Add some above!</div>`;
                    return;
                }

                products.forEach(product => {
                    const card = document.createElement('div');
                    // Premium Card Styling
                    card.className = 'bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group flex flex-col';
                    
                    let imageUrl = 'https://via.placeholder.com/300x300?text=No+Image';
                    if (product.image) {
                        const cleanFileName = product.image.replace(/^uploads[\\/]/, '');
                        imageUrl = `http://localhost:5000/uploads/${cleanFileName}`;
                    }

                    // Upgraded Card HTML Structure
                    card.innerHTML = `
                        <div class="h-48 w-full bg-slate-50 p-4 flex items-center justify-center overflow-hidden border-b border-slate-100 relative">
                            <span class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm text-slate-700 text-xs font-bold px-2.5 py-1 rounded-md shadow-sm border border-slate-100 z-10">
                                Stock: ${product.stock}
                            </span>
                            <img src="${imageUrl}" alt="${product.name}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition-transform duration-500 ease-in-out">
                        </div>
                        
                        <div class="p-5 flex flex-col flex-grow">
                            <div class="mb-3">
                                <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full">
                                    ${product.category}
                                </span>
                            </div>
                            
                            <h3 class="font-bold text-slate-800 text-lg mb-1 leading-tight line-clamp-2">${product.name}</h3>
                            <p class="text-emerald-600 font-extrabold text-xl mt-auto pt-2">${product.price} <span class="text-sm font-semibold text-slate-400">RWF</span></p>
                            
                            <button onclick="deleteProduct('${product._id}')" class="mt-4 w-full bg-slate-50 hover:bg-red-50 text-slate-500 hover:text-red-600 border border-slate-200 hover:border-red-200 font-semibold rounded-xl text-sm px-4 py-2 transition-colors duration-200 flex justify-center items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                                Delete
                            </button>
                        </div>
                    `;
                    productsGrid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching products:', error);
            }
        }

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('stock', document.getElementById('stock').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData 
                });

                if (response.ok) {
                    productForm.reset(); 
                    fetchProducts(); 
                } else {
                    alert('Error adding product');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        async function deleteProduct(id) {
            if(confirm('Are you sure you want to remove this item from the inventory?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        fetchProducts(); 
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }
        }

        fetchProducts();
    </script>
</body>
</html>
